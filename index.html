<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monitor Logístico Pro</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#0f172a">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2830/2830305.png">

    <!-- Tailwind CSS (CDN for GitHub Pages) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="./styles.css">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        background: '#0b0f1a', // Muy oscuro
                        surface: '#111827',    // Gris muy oscuro
                        border: '#1e293b',     // Borde sutil
                        primary: '#3b82f6',    // Azul brillante
                        accent: '#8b5cf6',     // Morado acento
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-background text-slate-200 antialiased h-screen flex flex-col overflow-hidden selection:bg-primary/30">

    <!-- Navbar / Header -->
    <header
        class="glass-panel border-b border-border p-4 sm:px-6 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4 sticky top-0 z-40 transition-all">
        <div class="flex items-center gap-4 w-full sm:w-auto">
            <div
                class="bg-gradient-to-br from-blue-600 to-indigo-600 p-2.5 rounded-xl shadow-lg shadow-blue-900/40 relative group cursor-pointer hover-lift">
                <i data-lucide="truck" class="h-6 w-6 text-white group-hover:scale-110 transition-transform"></i>
            </div>
            <div>
                <h1 class="text-xl sm:text-2xl font-bold text-white tracking-tight leading-none">Monitor Logístico</h1>
                <div class="flex items-center gap-2 mt-1.5 ml-0.5">
                    <span class="relative flex h-2 w-2">
                        <span
                            class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                    </span>
                    <p class="text-slate-400 text-[10px] sm:text-xs font-medium uppercase tracking-wider"
                        id="currentDateDisplay">Sincronizando...</p>
                </div>
            </div>
        </div>

        <div class="flex items-center gap-3 w-full sm:w-auto">
            <div class="relative flex-1 sm:w-80 group">
                <i data-lucide="search"
                    class="absolute left-3 top-1/2 -translate-y-1/2 h-4 w-4 text-slate-500 group-focus-within:text-primary transition-colors"></i>
                <input type="text" id="searchInput" placeholder="Buscar cliente, folio, chofer..."
                    class="bg-surface/80 text-sm rounded-xl border border-border w-full pl-10 pr-4 py-2.5 
                        focus:ring-2 focus:ring-primary/50 focus:border-primary text-white placeholder-slate-500 transition-all shadow-inner">
            </div>
            <button id="refreshBtn"
                class="p-2.5 bg-surface border border-border hover:bg-slate-800 hover:border-primary/50 text-slate-300 hover:text-white rounded-xl shadow-md transition-all flex-shrink-0 group hover-lift active:scale-95">
                <i data-lucide="refresh-cw"
                    class="h-5 w-5 group-hover:rotate-180 transition-transform duration-500"></i>
            </button>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="flex-1 overflow-y-auto overflow-x-hidden p-3 sm:p-6 lg:p-8 scroll-smooth relative">

        <div class="max-w-[1600px] mx-auto w-full">

            <!-- Tabs Navigation -->
            <div class="flex gap-2 sm:gap-4 mb-6 border-b border-border">
                <button id="tabDespachos"
                    class="px-4 py-3 border-b-2 border-primary text-white font-bold transition-colors text-sm sm:text-base flex items-center gap-2">
                    <i data-lucide="truck" class="w-4 h-4"></i> Despachos Internos
                </button>
                <button id="tabExterno"
                    class="px-4 py-3 border-b-2 border-transparent text-slate-500 hover:text-slate-300 font-bold transition-colors text-sm sm:text-base flex items-center gap-2">
                    <i data-lucide="globe" class="w-4 h-4"></i> Transporte Externo
                </button>
            </div>

            <!-- Filters & Stats Bar -->
            <div id="statsBar" class="hidden animate-fade-in mb-6 flex flex-wrap gap-2 items-center text-xs">
                <!-- Se llenará dinámicamente con chips de estados y contadores -->
            </div>

            <!-- Loading State -->
            <div id="loadingState" class="flex flex-col items-center justify-center h-[50vh] min-h-[300px]">
                <div class="relative w-16 h-16">
                    <div class="absolute inset-0 border-4 border-slate-800 rounded-full"></div>
                    <div
                        class="absolute inset-0 border-4 border-primary rounded-full border-t-transparent animate-spin">
                    </div>
                </div>
                <h3 class="mt-6 text-lg font-semibold text-white">Sincronizando Sistema</h3>
                <p class="text-slate-400 font-medium text-sm mt-1">Conectando con Google Sheets...</p>
            </div>

            <!-- Error State -->
            <div id="errorState"
                class="hidden flex flex-col items-center justify-center h-[50vh] min-h-[300px] text-center max-w-md mx-auto">
                <div
                    class="bg-red-500/10 p-5 rounded-full mb-5 shadow-[0_0_30px_rgba(239,68,68,0.15)] ring-1 ring-red-500/20">
                    <i data-lucide="wifi-off" class="h-10 w-10 text-red-400"></i>
                </div>
                <h3 class="text-xl font-bold text-white mb-2">Error de Conexión</h3>
                <p id="errorMessage" class="text-slate-400 mb-6 text-sm">No pudimos obtener los últimos datos.</p>
                <button id="retryBtn"
                    class="px-6 py-2.5 bg-white text-slate-900 font-semibold rounded-xl hover:bg-blue-50 transition-colors shadow-lg active:scale-95 flex items-center gap-2">
                    <i data-lucide="refresh-ccw" class="w-4 h-4"></i> Reintentar
                </button>
            </div>

            <!-- Content Area - Despachos -->
            <div id="contentArea" class="hidden space-y-6 pb-20 sm:pb-10">
                <!-- Se inyectarán los grupos (Choferes) dinámicamente aquí -->
            </div>

            <!-- Content Area - Transporte Externo -->
            <div id="contentExterno" class="hidden pb-20 sm:pb-10">
                <!-- Se inyectará la tabla de Transporte Externo aquí -->
            </div>

        </div>
    </main>

    <!-- Scripts -->
    <script src="./app.js"></script>
</body>

</html>
